<!DOCTYPE html>
<html lang="fr" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Produit | ELIAS PHONE</title>
    <meta name="description" content="Découvrez les caractéristiques détaillées de cet iPhone.">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            padding-top: 10rem;
            align-items: start;
        }

        .detail-image-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--glass-border);
            position: sticky;
            top: 120px;
        }

        .detail-image-box img {
            max-width: 100%;
            height: 480px;
            object-fit: contain;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
        }

        .detail-info {
            padding: 1rem 0;
        }

        .detail-info h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        .detail-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 2rem;
        }

        .detail-description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .spec-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .spec-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .spec-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        @media (max-width: 968px) {
            .detail-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .detail-image-box {
                position: static;
                padding: 1.5rem;
            }
            .detail-image-box img {
                height: 300px;
            }
        }

        .buttons-container {
            display: flex;
            flex-direction: row;
            gap: 16px;
            margin-top: 32px;
            width: 100%;
            align-items: stretch;
        }

        .btn-cart {
            flex: 1;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            background: #1c1c1e;
            color: #ffffff;
            border: 1px solid #3a3a3c;
            min-width: 0;
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-whatsapp {
            flex: 1;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background-color: #25D366;
            color: #fff;
        }

    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar glass-panel">
        <div class="logo">
            <a href="index.html" style="font-weight: 700; font-size: 1.2rem; letter-spacing: -0.05em; color: var(--text-main);">
                ELIAS PHONE.
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="boutique.html" class="nav-link">Boutique</a>
            <a href="promotions.html" class="nav-link">Promotions</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
        <div class="nav-icons text-muted">
            <button id="hamburger" class="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <button id="search-btn" class="icon-btn" aria-label="Rechercher">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button id="profile-btn" class="icon-btn profile-icon-container" aria-label="Profil">
                <svg id="profile-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <div id="profile-initial" class="profile-initial" style="display: none;"></div>
            </button>
            <button id="cart-btn" class="icon-btn" aria-label="Panier">
                <div class="cart-icon-wrapper" style="position: relative;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-badge" class="badge-count" style="display: none;">0</span>
                </div>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <div class="mobile-links">
            <a href="index.html" class="mobile-link">Accueil</a>
            <a href="boutique.html" class="mobile-link">Boutique</a>
            <a href="promotions.html" class="mobile-link">Promotions</a>
            <a href="contact.html" class="mobile-link">Contact</a>
        </div>
    </div>

    <main class="container">
        <div id="product-detail" class="detail-container">
            <!-- Dynamic Content Injected here -->
            <div style="padding: 10rem 0; text-align: center; grid-column: span 2;">
                <p class="text-muted">Chargement du produit...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
            <div style="font-weight: 700; font-size: 1.5rem; color: var(--text-main);">ELIAS PHONE.</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="boutique.html" class="nav-link">Boutique</a>
                <a href="promotions.html" class="nav-link">Promotions</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <a href="https://instagram.com/elias_phone_" target="_blank" rel="noopener noreferrer" class="nav-link text-muted" style="display: flex; align-items: center; gap: 0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
                @elias_phone_
            </a>
            <p style="font-size: 0.8rem; margin-top: 1rem;">&copy; 2025 Elias Phone. Tous droits réservés.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>

    <!-- Overlays (Injected by common logic if possible, or added here for consistency) -->
    <!-- These are usually injected by update_html.js, but for clarity I'll add the necessary ones if not already in main.js logic -->
     <!-- Search Overlay -->
     <div id="search-overlay" class="search-overlay glass-panel">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Rechercher un iPhone..." autocomplete="off">
            <button id="close-search" class="icon-btn">✕</button>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-backdrop" class="modal-backdrop"></div>
    <div id="cart-drawer" class="cart-drawer glass-panel">
        <div class="cart-header">
            <h3>Votre Panier</h3>
            <button id="close-cart" class="icon-btn">✕</button>
        </div>
        <div id="cart-items" class="cart-items">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price" class="tabular-nums">0 MAD</span>
            </div>
            <button id="checkout-btn" class="btn btn-primary" style="width: 100%;">Passer la commande</button>
        </div>
    </div>
    
    <!-- Profile/Auth Modal -->
    <div id="profile-backdrop" class="modal-backdrop"></div>
    <div id="profile-modal" class="profile-modal glass-panel">
        <button id="close-profile" class="icon-btn close-modal">✕</button>
        <div class="modal-tabs">
            <button class="tab-btn active" data-tab="login">Connexion</button>
            <button class="tab-btn" data-tab="register">Inscription</button>
        </div>
        
        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label for="login-pass">Mot de passe</label>
                <input type="password" id="login-pass" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
        </form>
        
        <!-- Register Form -->
        <form id="register-form" class="auth-form" style="display: none;">
            <div class="form-group">
                <label for="reg-name">Nom complet</label>
                <input type="text" id="reg-name" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label for="reg-pass">Mot de passe</label>
                <input type="password" id="reg-pass" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Créer un compte</button>
        </form>

        <div id="logged-in-view" style="display: none; text-align: center; padding: 2rem 0;">
            <div id="user-avatar-large" style="width: 60px; height: 60px; border-radius: 50%; background: #007aff; color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; margin: 0 auto 1rem;">M</div>
            <h3 id="user-greeting" style="margin-bottom: 2rem;">Bonjour!</h3>
            <button id="logout-btn" class="btn btn-outline" style="width: 100%; border-color: #ff3b30; color: #ff3b30;">Déconnexion</button>
        </div>
    </div>
</body>
</html>
